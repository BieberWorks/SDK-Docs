name: Update module documentation

on:
  repository_dispatch:
    types: [docs-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK-Docs
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Checkout module repo
        uses: actions/checkout@v4
        with:
          repository: BieberWorks/${{ github.event.client_payload.repo }}
          token: ${{ secrets.ORG_REPO_TOKEN }}
          path: _module-source

      - name: Copy docs
        run: |
          MODULE="${{ github.event.client_payload.module }}"
          TARGET="docs/modules/${MODULE,,}"
          if [ -d "_module-source/docs" ]; then
            mkdir -p "$TARGET"
            cp -r _module-source/docs/. "$TARGET/"
            echo "Copied docs for $MODULE"
          else
            echo "No docs/ folder found in module repo — skipping copy"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update ${{ github.event.client_payload.module }} to ${{ github.event.client_payload.version }}"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          gh workflow run deploy.yml --repo BieberWorks/SDK-Docs
