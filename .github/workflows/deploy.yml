name: Deploy docs to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Debounce — wait for further updates
        run: sleep 300

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest release versions from GitHub
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          REPOS=("SDK-Account" "SDK-Admin" "SDK-Audit" "SDK-Auth" "SDK-Email" "SDK-Foundation" "SDK-Localization" "SDK-Notifications" "SDK-Settings" "SDK-Storage" "SDK-UI" "SDK-Wallet")
          echo "{" > docs/modules-versions.json
          FIRST=true
          for REPO in "${REPOS[@]}"; do
            MODULE=$(echo "$REPO" | tr '[:upper:]' '[:lower:]' | sed 's/^sdk-//')
            VERSION=$(gh release list --repo "BieberWorks/$REPO" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "–")
            [ -z "$VERSION" ] && VERSION="–"
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> docs/modules-versions.json; fi
            printf '  "%s": "%s"' "$MODULE" "$VERSION" >> docs/modules-versions.json
          done
          echo "" >> docs/modules-versions.json
          echo "}" >> docs/modules-versions.json
          cat docs/modules-versions.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Clean up cancelled deploy runs
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          gh run list --repo BieberWorks/SDK-Docs \
            --workflow deploy.yml \
            --status cancelled \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId' \
          | xargs -I{} gh run delete {} --repo BieberWorks/SDK-Docs
          echo "Cancelled deploy runs cleaned up"
